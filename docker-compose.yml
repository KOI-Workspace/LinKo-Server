services:
  postgres:
    image: postgres:16-alpine
    container_name: linko-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: linko
      POSTGRES_USER: linko
      POSTGRES_PASSWORD: linko
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linko -d linko"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
